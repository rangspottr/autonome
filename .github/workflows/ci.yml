name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd server && npm ci
      - name: Lint
        run: npx eslint . --ext .js,.jsx --max-warnings 0
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
